

services:
  # FastAPI AI Models Backend (CPU ONLY)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.cpu
    container_name: kfintech_backend_cpu
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    networks:
      - kfintech-network

  # Local MongoDB Replica Set for strict transactions
  mongodb:
    image: mongo:latest
    container_name: kfintech_mongo_cpu
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    networks:
      - kfintech-network

  # Node.js (Express/NestJS) Backend
  node_service:
    build:
      context: ./node_service
      dockerfile: Dockerfile
    container_name: kfintech_node_cpu
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/kfintech_nexus?directConnection=true
      - ML_SERVICE_URL=http://backend:8000
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-south-1
    depends_on:
      - mongodb
      - backend
    networks:
      - kfintech-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kfintech_frontend_cpu
    ports:
      - "5173:5173"
    depends_on:
      - node_service
    networks:
      - kfintech-network

  # Local Llama 3 AI Engine (CPU ONLY)
  ollama:
    image: ollama/ollama:latest
    container_name: kfintech_ollama_cpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:1b && wait"]
    networks:
      - kfintech-network

  # AWS LocalStack
  localstack:
    image: localstack/localstack:2.3.2
    container_name: kfintech_localstack_cpu
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
      - AWS_DEFAULT_REGION=ap-south-1
    networks:
      - kfintech-network

networks:
  kfintech-network:
    driver: bridge

volumes:
  ollama_data:
  localstack_data:
