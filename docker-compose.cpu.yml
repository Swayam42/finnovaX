version: '3.8'

services:
  # FastAPI AI Models Backend (CPU ONLY)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kfintech_backend_cpu
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    networks:
      - kfintech-network

  # Local MongoDB Replica Set for strict transactions
  mongodb:
    image: mongo:latest
    container_name: kfintech_mongo_cpu
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    networks:
      - kfintech-network

  # Node.js (Express/NestJS) Backend
  node_service:
    build:
      context: ./node_service
      dockerfile: Dockerfile
    container_name: kfintech_node_cpu
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/kfintech_nexus?directConnection=true
      - ML_SERVICE_URL=http://backend:8000
    depends_on:
      - mongodb
      - backend
    networks:
      - kfintech-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kfintech_frontend_cpu
    ports:
      - "5173:5173"
    depends_on:
      - node_service
    networks:
      - kfintech-network

networks:
  kfintech-network:
    driver: bridge
