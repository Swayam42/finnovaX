

services:
  # FastAPI AI Models Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: finnovax_backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - finnovax-network

  # Local MongoDB Replica Set for strict transactions
  mongodb:
    image: mongo:latest
    container_name: finnovax_mongo
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    networks:
      - finnovax-network

  # Node.js (Express/NestJS) Backend
  node_service:
    build:
      context: ./node_service
      dockerfile: Dockerfile
    container_name: finnovax_node
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/finnovax_nexus?directConnection=true
      - ML_SERVICE_URL=http://backend:8000
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-south-1
    volumes:
      - ./node_service:/app
      - /app/node_modules
    depends_on:
      - mongodb
      - backend
    networks:
      - finnovax-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finnovax_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - node_service
    networks:
      - finnovax-network



  # AWS LocalStack
  localstack:
    image: localstack/localstack:2.3.2
    container_name: finnovax_localstack
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
      - AWS_DEFAULT_REGION=ap-south-1
    networks:
      - finnovax-network

networks:
  finnovax-network:
    driver: bridge

volumes:

  localstack_data:


